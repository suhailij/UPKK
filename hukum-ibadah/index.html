<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kad Imbas · Hukum & Alasan Ibadah</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F3E9; --paper-2:#FBF8F0; --ink:#2B2A26; --ink-soft:#5B574C;
    --gold:#C9A227; --gold-deep:#A47F14; --line:#E4DBC5;
    --solat:#2E7D5B; --solat-bg:#E7F3EC;
    --musafir:#2F6F9E; --musafir-bg:#E6EFF5;
    --puasa:#7B4B94; --puasa-bg:#F1E9F5;
    --taharah:#C2703D; --taharah-bg:#FBEEE4;
    --accent:var(--solat); --accent-bg:var(--solat-bg);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{overflow-x:hidden}
  .a-body,.alasan,ol.cara li{overflow-wrap:anywhere}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #FDFBF4 0%, transparent 60%), var(--paper);
    color:var(--ink);min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:20px 16px 40px;-webkit-tap-highlight-color:transparent}
  .wrap{width:100%;max-width:600px;display:flex;flex-direction:column;gap:16px}
  header{text-align:center;padding-top:6px}
  .eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold-deep);font-weight:700}
  h1{font-family:'Amiri',serif;font-weight:700;font-size:26px;line-height:1.2;margin:6px 0 2px}
  .sub{font-size:12.5px;color:var(--ink-soft)}
  .divider{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 2px;color:var(--gold)}
  .divider::before,.divider::after{content:"";height:1px;width:52px;background:linear-gradient(90deg,transparent,var(--gold))}
  .divider::after{background:linear-gradient(90deg,var(--gold),transparent)}
  .divider span{font-size:13px}
  .tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
  .tab{border:1.5px solid var(--line);background:var(--paper-2);color:var(--ink-soft);
    font:inherit;font-weight:600;font-size:12.5px;padding:8px 12px;border-radius:999px;cursor:pointer;
    transition:.18s;display:flex;align-items:center;gap:6px}
  .tab .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.55}
  .tab[data-k="solat"]{--c:var(--solat)} .tab[data-k="musafir"]{--c:var(--musafir)}
  .tab[data-k="puasa"]{--c:var(--puasa)} .tab[data-k="taharah"]{--c:var(--taharah)} .tab[data-k="all"]{--c:var(--gold-deep)}
  .tab.active{background:var(--c,var(--gold-deep));border-color:var(--c,var(--gold-deep));color:#fff}
  .tab.active .dot{opacity:1;background:#fff}
  .meta{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);font-weight:600}
  .meta .known{color:var(--solat)}
  .bar{height:6px;background:var(--line);border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s}
  .stage{perspective:1600px;width:100%}
  .card{position:relative;width:100%;cursor:pointer;display:grid;
    transition:transform .55s cubic-bezier(.2,.7,.2,1);transform-style:preserve-3d;-webkit-transform-style:preserve-3d}
  .card.flip{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
  .face{grid-area:1/1;width:100%;min-height:340px;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:18px;background:var(--paper-2);border:1px solid var(--line);
    box-shadow:0 1px 0 #fff inset, 0 18px 40px -24px rgba(60,50,20,.5);
    padding:26px 24px;display:flex;flex-direction:column;overflow:visible}
  .face::before{content:"";position:absolute;inset:10px;border-radius:12px;pointer-events:none;
    border:1.5px solid color-mix(in srgb, var(--accent) 30%, transparent)}
  .corner{position:absolute;width:16px;height:16px;border:2px solid var(--gold);opacity:.75}
  .corner.tl{top:14px;left:14px;border-right:0;border-bottom:0;border-radius:4px 0 0 0}
  .corner.tr{top:14px;right:14px;border-left:0;border-bottom:0;border-radius:0 4px 0 0}
  .corner.bl{bottom:14px;left:14px;border-right:0;border-top:0;border-radius:0 0 0 4px}
  .corner.br{bottom:14px;right:14px;border-left:0;border-top:0;border-radius:0 0 4px 0}
  .back{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
  .tagrow{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1}
  .chip{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;color:var(--accent);
    background:var(--accent-bg);padding:5px 10px;border-radius:999px}
  .side{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .q-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;position:relative;z-index:1;padding:8px 2px}
  .qmark{font-family:'Amiri',serif;font-size:26px;color:var(--gold-deep);line-height:1}
  .situasi{font-size:16px;line-height:1.5;color:var(--ink);max-width:480px}
  .prompt{font-family:'Amiri',serif;font-size:17px;font-weight:700;color:var(--accent);line-height:1.35}
  .hint{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
  .hint .tapdot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .a-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:9px;position:relative;z-index:1;padding-top:4px}
  .lbl{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:800;color:var(--ink-soft)}
  .verdict{display:inline-block;font-family:'Amiri',serif;font-weight:800;font-size:22px;padding:7px 20px;border-radius:999px;letter-spacing:.01em}
  .verdict.pos{background:#E7F3EC;color:#1E6B47;border:1.6px solid #2E7D5B}
  .verdict.neg{background:#FBE9E6;color:#B23A2E;border:1.6px solid #C85A48}
  .verdict.warn{background:#FCF3DF;color:#977714;border:1.6px solid #D9B441}
  .alasan{font-size:15px;line-height:1.55;color:var(--ink);max-width:480px;margin-top:2px}
  ol.cara{list-style:none;counter-reset:c;display:flex;flex-direction:column;gap:7px;align-self:center;max-width:420px;margin-top:2px}
  ol.cara li{counter-increment:c;display:flex;gap:10px;align-items:flex-start;text-align:left;font-size:15px;line-height:1.4}
  ol.cara li::before{content:counter(c);flex:0 0 auto;width:22px;height:22px;border-radius:6px;background:var(--accent);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .note{position:relative;z-index:1;margin-top:8px;font-size:11.5px;color:var(--ink-soft);text-align:center;font-style:italic}
  .note::before{content:"\203B  "}
  .controls{display:flex;flex-direction:column;gap:12px}
  .nav{display:flex;gap:10px}
  .btn{flex:1;font:inherit;font-weight:700;font-size:14.5px;padding:13px;border-radius:13px;cursor:pointer;
    border:1.5px solid var(--line);background:var(--paper-2);color:var(--ink);transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn:hover{border-color:var(--gold);color:var(--gold-deep)}
  .btn:active{transform:translateY(1px)}
  .btn.solid{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.solid:hover{filter:brightness(1.05);color:#fff}
  .mark{display:flex;gap:10px}
  .btn.known{color:var(--solat)} .btn.known:hover{border-color:var(--solat)}
  .btn.review{color:var(--taharah)} .btn.review:hover{border-color:var(--taharah)}
  .btn.known.on{background:var(--solat);border-color:var(--solat);color:#fff}
  .util{display:flex;gap:10px}
  .util .btn{font-size:13px;font-weight:600;padding:10px}
  footer{text-align:center;font-size:11px;color:var(--ink-soft);line-height:1.6;margin-top:4px}
  footer b{color:var(--gold-deep)}
  @media (max-width:420px){h1{font-size:22px}.situasi{font-size:15px}.prompt{font-size:15.5px}.face{padding:22px 18px}
    .verdict{font-size:20px}.alasan{font-size:14px}}
  @media (prefers-reduced-motion:reduce){.card{transition:none}.tapdot{animation:none}}

/* iPhone/Safari compatibility: avoid 3D flip rendering that can mirror or overlap text */
.stage{
  perspective:none !important;
  -webkit-perspective:none !important;
}
.card{
  transform:none !important;
  -webkit-transform:none !important;
  transform-style:flat !important;
  -webkit-transform-style:flat !important;
}
.face{
  backface-visibility:visible !important;
  -webkit-backface-visibility:visible !important;
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  transition:opacity .22s ease, visibility 0s linear 0s !important;
}
.back{
  transform:none !important;
  -webkit-transform:none !important;
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity .22s ease, visibility 0s linear .22s !important;
}
.card.flip .front{
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transition:opacity .22s ease, visibility 0s linear .22s !important;
}
.card.flip .back{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  transition:opacity .22s ease, visibility 0s linear 0s !important;
}
@media (prefers-reduced-motion:reduce){
  .face,.back,.card.flip .front,.card.flip .back{transition:none !important}
}

</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Kad Imbas · Hukum &amp; Alasan</div>
    <h1>Ibadah UPKK</h1>
    <div class="sub">Solat · Musafir · Puasa · Taharah</div>
    <div class="divider"><span>۞</span></div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-k="all"><span class="dot"></span>Semua</button>
    <button class="tab" data-k="solat"><span class="dot"></span>Solat</button>
    <button class="tab" data-k="musafir"><span class="dot"></span>Musafir</button>
    <button class="tab" data-k="puasa"><span class="dot"></span>Puasa</button>
    <button class="tab" data-k="taharah"><span class="dot"></span>Taharah</button>
  </div>

  <div class="meta">
    <span id="counter">Kad 1 / 1</span>
    <span class="known" id="knownCount">✓ 0 sudah tahu</span>
  </div>
  <div class="bar"><i id="barFill"></i></div>

  <div class="stage">
    <div class="card" id="card">
      <div class="face front">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="tagrow"><span class="chip" id="fChip">—</span><span class="side">Situasi</span></div>
        <div class="q-center">
          <div class="qmark">؟</div>
          <div class="situasi" id="fSituasi">—</div>
          <div class="prompt" id="fPrompt"></div>
        </div>
        <div class="hint"><span class="tapdot"></span> Ketik untuk lihat hukum &amp; alasan</div>
      </div>
      <div class="face back">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="tagrow"><span class="chip" id="bChip">—</span><span class="side">Jawapan</span></div>
        <div class="a-body" id="bAnswer"></div>
        <div class="note" id="bNote" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="mark">
      <button class="btn known" id="btnKnown">✓ Sudah tahu</button>
      <button class="btn review" id="btnReview">↻ Ulang semula</button>
    </div>
    <div class="nav">
      <button class="btn" id="btnPrev">‹ Sebelum</button>
      <button class="btn solid" id="btnFlip">Selak kad</button>
      <button class="btn" id="btnNext">Seterus ›</button>
    </div>
    <div class="util">
      <button class="btn" id="btnShuffle">🔀 Kocok</button>
      <button class="btn" id="btnReset">⟲ Set semula progres</button>
    </div>
  </div>

  <footer>
    <b>Koleksi Soalan Hukum &amp; Alasan: Ibadah UPKK</b><br>
    Titipan UPKK Ustazah Azizah
  </footer>
</div>

    hukum:"Wajib / Sah", alasan:"Kerana Zainab telah suci daripada haid.", note:"Kedua-dua jawapan diterima"},
  {s:"taharah", q:"Hidayah melakukan tawaf tanpa mengambil wuduk.", prompt:"Apakah hukum tawaf Hidayah?",
    hukum:"Tidak sah", alasan:"Kerana tawaf adalah perkara yang dilarang ketika berhadas kecil."},
  {s:"taharah", q:"Fatin mandi wajib dengan mendahului anggota kiri.", prompt:"Apakah hukum mandi wajib Fatin?",
    hukum:"Sah", alasan:"Kerana mendahului anggota kanan adalah perkara sunat mandi wajib."},
];

const LABEL={solat:"Solat",musafir:"Musafir",puasa:"Puasa",taharah:"Taharah",all:"Semua"};
DECK.forEach((c,i)=>c.id=i);
let filter="all",order=[],pos=0,flipped=false;
let known=loadKnown();
const el=id=>document.getElementById(id);
const card=el("card"),fChip=el("fChip"),bChip=el("bChip"),fSituasi=el("fSituasi"),fPrompt=el("fPrompt"),bAnswer=el("bAnswer"),bNote=el("bNote");
function loadKnown(){try{return new Set(JSON.parse(localStorage.getItem("hukumAlasan_known")||"[]"));}catch(e){return new Set();}}
function saveKnown(){try{localStorage.setItem("hukumAlasan_known",JSON.stringify([...known]));}catch(e){}}
function buildOrder(){order=DECK.filter(c=>filter==="all"||c.s===filter).map(c=>c.id);pos=0;}
function setAccent(sec){
  const map={solat:["--solat","--solat-bg"],musafir:["--musafir","--musafir-bg"],puasa:["--puasa","--puasa-bg"],taharah:["--taharah","--taharah-bg"]};
  const [c,bg]=map[sec]||map.solat;
  document.documentElement.style.setProperty("--accent",`var(${c})`);
  document.documentElement.style.setProperty("--accent-bg",`var(${bg})`);
}
function verdictClass(h){
  const t=h.toLowerCase();
  if(t.includes("tidak sah")||t.includes("batal")||t.includes("haram"))return "neg";
  if(t.includes("makruh"))return "warn";
  return "pos";
}
function render(){
  const total=order.length;
  if(!total){el("counter").textContent="Tiada kad";return;}
  const c=DECK[order[pos]];
  flipped=false;card.classList.remove("flip");
  setAccent(c.s);
  fChip.textContent=LABEL[c.s];bChip.textContent=LABEL[c.s];
  fSituasi.textContent=c.q;
  fPrompt.textContent=c.prompt||"";
  bAnswer.innerHTML="";
  const l1=document.createElement("div");l1.className="lbl";l1.textContent="Hukum";bAnswer.appendChild(l1);
  const v=document.createElement("div");v.className="verdict "+verdictClass(c.hukum);v.textContent=c.hukum;bAnswer.appendChild(v);
  if(c.cara){
    const l2=document.createElement("div");l2.className="lbl";l2.style.marginTop="6px";l2.textContent="Cara solat";bAnswer.appendChild(l2);
    const ol=document.createElement("ol");ol.className="cara";
    c.cara.forEach(t=>{const li=document.createElement("li");li.textContent=t;ol.appendChild(li);});bAnswer.appendChild(ol);
  }else{
    const l2=document.createElement("div");l2.className="lbl";l2.style.marginTop="6px";l2.textContent="Alasan";bAnswer.appendChild(l2);
    const a=document.createElement("div");a.className="alasan";a.textContent=c.alasan;bAnswer.appendChild(a);
  }
  if(c.note){bNote.style.display="block";bNote.textContent=c.note;}else{bNote.style.display="none";}
  el("counter").textContent=`Kad ${pos+1} / ${total}`;
  el("barFill").style.width=((pos+1)/total*100)+"%";
  const knownInView=order.filter(id=>known.has(id)).length;
  el("knownCount").textContent=`✓ ${knownInView} sudah tahu`;
  el("btnKnown").classList.toggle("on",known.has(c.id));
}
function flip(){flipped=!flipped;card.classList.toggle("flip",flipped);}
function next(){if(!order.length)return;pos=(pos+1)%order.length;render();}
function prev(){if(!order.length)return;pos=(pos-1+order.length)%order.length;render();}
function shuffle(){for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}pos=0;render();}
card.addEventListener("click",flip);
el("btnFlip").addEventListener("click",e=>{e.stopPropagation();flip();});
el("btnNext").addEventListener("click",next);
el("btnPrev").addEventListener("click",prev);
el("btnShuffle").addEventListener("click",shuffle);
el("btnKnown").addEventListener("click",()=>{const id=DECK[order[pos]].id;known.has(id)?known.delete(id):known.add(id);saveKnown();render();});
el("btnReview").addEventListener("click",()=>{const id=DECK[order[pos]].id;known.delete(id);saveKnown();next();});
el("btnReset").addEventListener("click",()=>{if(confirm("Set semula semua progres 'sudah tahu'?")){known.clear();saveKnown();render();}});
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");filter=t.dataset.k;buildOrder();render();});
});
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")next();else if(e.key==="ArrowLeft")prev();
  else if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();}
});
buildOrder();render();
</script>
</body>
</html>
