<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kad Imbas · Amali Solat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F3E9; --paper-2:#FBF8F0; --ink:#2B2A26; --ink-soft:#5B574C;
    --gold:#C9A227; --gold-deep:#A47F14; --line:#E4DBC5;
    --persediaan:#B8862B; --persediaan-bg:#F6EEDC;
    --dalam:#2E7D5B; --dalam-bg:#E7F3EC;
    --selepas:#7B4B94; --selepas-bg:#F1E9F5;
    --accent:var(--persediaan); --accent-bg:var(--persediaan-bg);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{overflow-x:hidden}
  .a-body,.single,.plain li,.points li{overflow-wrap:anywhere}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%, #FDFBF4 0%, transparent 60%), var(--paper);
    color:var(--ink);min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:20px 16px 40px;-webkit-tap-highlight-color:transparent}
  .wrap{width:100%;max-width:600px;display:flex;flex-direction:column;gap:16px}
  header{text-align:center;padding-top:6px}
  .eyebrow{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold-deep);font-weight:700}
  h1{font-family:'Amiri',serif;font-weight:700;font-size:28px;line-height:1.2;margin:6px 0 2px}
  .sub{font-size:12.5px;color:var(--ink-soft)}
  .divider{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 2px;color:var(--gold)}
  .divider::before,.divider::after{content:"";height:1px;width:52px;background:linear-gradient(90deg,transparent,var(--gold))}
  .divider::after{background:linear-gradient(90deg,var(--gold),transparent)}
  .divider span{font-size:13px}
  .tabs{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
  .tab{border:1.5px solid var(--line);background:var(--paper-2);color:var(--ink-soft);
    font:inherit;font-weight:600;font-size:12.5px;padding:8px 12px;border-radius:999px;cursor:pointer;
    transition:.18s;display:flex;align-items:center;gap:6px}
  .tab .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.55}
  .tab[data-k="persediaan"]{--c:var(--persediaan)} .tab[data-k="dalam"]{--c:var(--dalam)}
  .tab[data-k="selepas"]{--c:var(--selepas)} .tab[data-k="all"]{--c:var(--gold-deep)}
  .tab.active{background:var(--c,var(--gold-deep));border-color:var(--c,var(--gold-deep));color:#fff}
  .tab.active .dot{opacity:1;background:#fff}
  .meta{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;color:var(--ink-soft);font-weight:600}
  .meta .known{color:var(--dalam)}
  .bar{height:6px;background:var(--line);border-radius:999px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .3s}
  .stage{perspective:1600px}
  .card{position:relative;width:100%;cursor:pointer;display:grid;
    transition:transform .55s cubic-bezier(.2,.7,.2,1);transform-style:preserve-3d;-webkit-transform-style:preserve-3d}
  .stage{width:100%}
  .card.flip{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
  .face{grid-area:1/1;width:100%;min-height:320px;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:18px;background:var(--paper-2);border:1px solid var(--line);
    box-shadow:0 1px 0 #fff inset, 0 18px 40px -24px rgba(60,50,20,.5);
    padding:26px 24px;display:flex;flex-direction:column;overflow:visible}
  .face::before{content:"";position:absolute;inset:10px;border-radius:12px;pointer-events:none;
    border:1.5px solid color-mix(in srgb, var(--accent) 30%, transparent)}
  .corner{position:absolute;width:16px;height:16px;border:2px solid var(--gold);opacity:.75}
  .corner.tl{top:14px;left:14px;border-right:0;border-bottom:0;border-radius:4px 0 0 0}
  .corner.tr{top:14px;right:14px;border-left:0;border-bottom:0;border-radius:0 4px 0 0}
  .corner.bl{bottom:14px;left:14px;border-right:0;border-top:0;border-radius:0 0 0 4px}
  .corner.br{bottom:14px;right:14px;border-left:0;border-top:0;border-radius:0 0 4px 0}
  .back{transform:rotateY(180deg);-webkit-transform:rotateY(180deg)}
  .tagrow{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1}
  .chip{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:var(--accent);
    background:var(--accent-bg);padding:5px 10px;border-radius:999px}
  .side{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .q-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;position:relative;z-index:1}
  .qmark{font-family:'Amiri',serif;font-size:28px;color:var(--gold-deep);line-height:1}
  .question{font-family:'Amiri',serif;font-size:23px;font-weight:700;line-height:1.35;color:var(--ink)}
  .hint{font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
  .hint .tapdot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  .a-body{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px;position:relative;z-index:1;padding-top:6px}
  ol.points{list-style:none;counter-reset:p;display:flex;flex-direction:column;gap:8px;align-self:center;max-width:470px;width:100%}
  ol.points li{counter-increment:p;display:flex;gap:11px;align-items:flex-start;font-size:14.5px;line-height:1.4}
  ol.points li::before{content:counter(p);flex:0 0 auto;width:22px;height:22px;border-radius:7px;
    background:var(--accent);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px}
  ul.plain{list-style:none;display:flex;flex-direction:column;gap:8px;align-self:center;max-width:480px}
  ul.plain li{display:flex;gap:10px;align-items:flex-start;font-size:15px;line-height:1.45}
  ul.plain li::before{content:"◈";color:var(--gold);font-size:11px;margin-top:4px}
  .acaption{font-size:12px;font-weight:700;color:var(--accent);text-align:center;text-transform:uppercase;letter-spacing:.08em}
  .arabic{font-family:'Amiri',serif;direction:rtl;font-size:25px;line-height:1.95;text-align:center;color:var(--ink);align-self:center;max-width:520px}
  .arabic.long{font-size:18px;line-height:1.95}
  .arabic.seq{display:flex;flex-direction:column;gap:4px}
  .arabic-line{font-family:'Amiri',serif;direction:rtl;font-size:20px;line-height:1.6;text-align:center;color:var(--ink)}
  .maksud{font-size:13px;line-height:1.55;text-align:center;color:var(--ink-soft);font-style:italic;max-width:490px;align-self:center}
  .note{position:relative;z-index:1;margin-top:10px;font-size:11.5px;color:var(--ink-soft);text-align:center;font-style:italic}
  .note::before{content:"※ "}
  .controls{display:flex;flex-direction:column;gap:12px}
  .nav{display:flex;gap:10px}
  .btn{flex:1;font:inherit;font-weight:700;font-size:14.5px;padding:13px;border-radius:13px;cursor:pointer;
    border:1.5px solid var(--line);background:var(--paper-2);color:var(--ink);transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn:hover{border-color:var(--gold);color:var(--gold-deep)}
  .btn:active{transform:translateY(1px)}
  .btn.solid{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.solid:hover{filter:brightness(1.05);color:#fff}
  .mark{display:flex;gap:10px}
  .btn.known{color:var(--dalam)} .btn.known:hover{border-color:var(--dalam)}
  .btn.review{color:var(--persediaan)} .btn.review:hover{border-color:var(--persediaan)}
  .btn.known.on{background:var(--dalam);border-color:var(--dalam);color:#fff}
  .util{display:flex;gap:10px}
  .util .btn{font-size:13px;font-weight:600;padding:10px}
  footer{text-align:center;font-size:11px;color:var(--ink-soft);line-height:1.6;margin-top:4px}
  footer b{color:var(--gold-deep)}
  @media (max-width:420px){h1{font-size:23px}.question{font-size:20px}.face{padding:22px 18px}
    .arabic{font-size:22px}.arabic.long{font-size:16.5px}.arabic-line{font-size:18px}}
  @media (prefers-reduced-motion:reduce){.card{transition:none}.tapdot{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Kad Imbas · UPKK</div>
    <h1>Amali Solat</h1>
    <div class="sub">Persediaan · Dalam Solat · Selepas Solat</div>
    <div class="divider"><span>۞</span></div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-k="all"><span class="dot"></span>Semua</button>
    <button class="tab" data-k="persediaan"><span class="dot"></span>Persediaan</button>
    <button class="tab" data-k="dalam"><span class="dot"></span>Dalam Solat</button>
    <button class="tab" data-k="selepas"><span class="dot"></span>Selepas Solat</button>
  </div>

  <div class="meta">
    <span id="counter">Kad 1 / 1</span>
    <span class="known" id="knownCount">✓ 0 sudah tahu</span>
  </div>
  <div class="bar"><i id="barFill"></i></div>

  <div class="stage">
    <div class="card" id="card">
      <div class="face front">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="tagrow"><span class="chip" id="fChip">—</span><span class="side">Soalan</span></div>
        <div class="q-center"><div class="qmark">۩</div><div class="question" id="fQuestion">—</div></div>
        <div class="hint"><span class="tapdot"></span> Ketik kad untuk lihat jawapan</div>
      </div>
      <div class="face back">
        <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
        <div class="tagrow"><span class="chip" id="bChip">—</span><span class="side">Jawapan</span></div>
        <div class="a-body" id="bAnswer"></div>
        <div class="note" id="bNote" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="mark">
      <button class="btn known" id="btnKnown">✓ Sudah tahu</button>
      <button class="btn review" id="btnReview">↻ Ulang semula</button>
    </div>
    <div class="nav">
      <button class="btn" id="btnPrev">‹ Sebelum</button>
      <button class="btn solid" id="btnFlip">Selak kad</button>
      <button class="btn" id="btnNext">Seterus ›</button>
    </div>
    <div class="util">
      <button class="btn" id="btnShuffle">🔀 Kocok</button>
      <button class="btn" id="btnReset">⟲ Set semula progres</button>
    </div>
  </div>

  <footer>
    <b>Amali Solat</b> · By Ustazah Ummul Syabinar
  </footer>
</div>

<script>
/* ===== DATA — kandungan diambil dari dokumen; bacaan Arabic dalam teks piawai; tiada tambahan ===== */
const DECK = [
  /* ============ BAHAGIAN A : PERSEDIAAN SEBELUM SOLAT ============ */
  {s:"persediaan", q:"Cara Berpakaian dan Tempat Solat", style:"bul",
    desc:["Pakaian mestilah menutup aurat","Bersih, kemas dan suci","Tempat solat mestilah bersih dan suci"]},
  {s:"persediaan", q:"Amali Wuduk (8 langkah)", style:"num",
    desc:["Membaca bismillah",
      "Membasuh tangan — kedua tangan hingga kepergelangan sebanyak tiga kali",
      "Berkumur — berkumur-kumur, memasukkan air dalam hidung",
      "Basuh muka — dari tempat tumbuh rambut hingga bawah dagu dan dari anak telinga kanan ke kiri, berserta niat",
      "Membasuh tangan ke siku — kedua-dua belah tangan sehingga ke siku",
      "Sapu kepala — menyapu sedikit bahagian kepala",
      "Basuh kaki — kedua kaki hingga ke buku lali","Tertib"],
    note:"Membasuh tiap-tiap anggota wuduk sebanyak 3 kali · Mendahulukan anggota kanan daripada anggota kiri"},
  {s:"persediaan", q:"Niat Wuduk", arabic:"نَوَيْتُ الْوُضُوءَ لِلَّهِ تَعَالَى",
    a2:"Sahaja aku mengambil air sembahyang kerana Allah Taala."},
  {s:"persediaan", q:"Doa Selepas Wuduk",
    arabic:"أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ، اللَّهُمَّ اجْعَلْنِي مِنَ التَّوَّابِينَ وَاجْعَلْنِي مِنَ الْمُتَطَهِّرِينَ"},
  {s:"persediaan", q:"Amali Tayammum (4 langkah)", style:"num",
    desc:["Tepuk debu — tepukkan kedua-dua belah tangan pada debu tanah",
      "Sapu muka — niat dan sapukan kedua-dua belah tapak tangan ke muka dari bahagian dahi hingga ke bawah dagu",
      "Tepuk debu — tepukkan kedua-dua belah tangan pada debu tanah sekali lagi",
      "Sapu tangan — sapu tangan kanan dari belakang jari hingga ke siku, kemudian dari pelipat lengan hingga ke tapak tangan dan jari. Lakukan cara yang sama pada tangan kiri"]},
  {s:"persediaan", q:"Niat Tayammum",
    arabic:"نَوَيْتُ التَّيَمُّمَ لِاسْتِبَاحَةِ الصَّلَاةِ فَرْضًا لِلَّهِ تَعَالَى",
    a2:"Saya berniat bertayammum untuk mengharuskan solat fardu kerana Allah Taala."},
  {s:"persediaan", q:"Lafaz Azan", arabic:[
    "اللَّهُ أَكْبَرُ اللَّهُ أَكْبَرُ","أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ",
    "أَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ","حَيَّ عَلَى الصَّلَاةِ","حَيَّ عَلَى الْفَلَاحِ",
    "الصَّلَاةُ خَيْرٌ مِنَ النَّوْمِ","اللَّهُ أَكْبَرُ اللَّهُ أَكْبَرُ","لَا إِلَهَ إِلَّا اللَّهُ"]},
  {s:"persediaan", q:"Jawapan Azan", arabic:[
    "اللَّهُ أَكْبَرُ اللَّهُ أَكْبَرُ","أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ",
    "أَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ","لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ",
    "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ","صَدَقْتَ وَبَرَرْتَ وَأَنَا مِنَ الشَّاهِدِينَ",
    "اللَّهُ أَكْبَرُ اللَّهُ أَكْبَرُ","لَا إِلَهَ إِلَّا اللَّهُ"]},
  {s:"persediaan", q:"Lafaz Iqamah", arabic:[
    "اللَّهُ أَكْبَرُ اللَّهُ أَكْبَرُ","أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ",
    "أَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ اللَّهِ","حَيَّ عَلَى الصَّلَاةِ","حَيَّ عَلَى الْفَلَاحِ",
    "قَدْ قَامَتِ الصَّلَاةُ قَدْ قَامَتِ الصَّلَاةُ","اللَّهُ أَكْبَرُ اللَّهُ أَكْبَرُ","لَا إِلَهَ إِلَّا اللَّهُ"]},
  {s:"persediaan", q:"Jawapan Iqamah", arabic:[

  {s:"persediaan", q:"Doa Selepas Azan dan Iqamah",

  {s:"persediaan", q:"Sunnah Azan dan Iqamah", style:"bul",
    desc:["Berdiri betul menghadap ke arah kiblat","Berpakaian kemas, bersih dan suci","Bersuara nyaring"]},

  /* ============ BAHAGIAN B : PERLAKUAN DAN BACAAN DALAM SOLAT ============ */
  {s:"dalam", q:"Perlakuan dalam Solat (13 langkah, ikut urutan)", style:"num",

  {s:"dalam", q:"Niat Solat Subuh",

    a2:"Sahaja aku menunaikan solat fardu Subuh dua rakaat tunai kerana Allah Taala."},
  {s:"dalam", q:"Niat Solat Zohor",

  {s:"dalam", q:"Niat Solat Asar",
    arabic:"أُصَلِّي فَرْضَ الْعَصْرِ أَرْبَعَ رَكَعَاتٍ أَدَاءً لِلَّهِ تَعَالَى",

  {s:"dalam", q:"Niat Solat Maghrib",
    arabic:"أُصَلِّي فَرْضَ الْمَغْرِبِ ثَلَاثَ رَكَعَاتٍ أَدَاءً لِلَّهِ تَعَالَى",
    a2:"Sahaja aku menunaikan solat fardu Maghrib tiga rakaat tunai kerana Allah Taala."},
  {s:"dalam", q:"Niat Solat Isyak",
    arabic:"أُصَلِّي فَرْضَ الْعِشَاءِ أَرْبَعَ رَكَعَاتٍ أَدَاءً لِلَّهِ تَعَالَى",
    a2:"Sahaja aku menunaikan solat fardu Isyak empat rakaat tunai kerana Allah Taala."},
  {s:"dalam", q:"Takbiratul Ihram", style:"bul",

];

const LABEL={persediaan:"Persediaan",dalam:"Dalam Solat",selepas:"Selepas Solat",all:"Semua"};
DECK.forEach((c,i)=>c.id=i);

let filter="all",order=[],pos=0,flipped=false;
let known=loadKnown();
const el=id=>document.getElementById(id);
const card=el("card"),fChip=el("fChip"),bChip=el("bChip"),fQuestion=el("fQuestion"),bAnswer=el("bAnswer"),bNote=el("bNote");

function loadKnown(){try{return new Set(JSON.parse(localStorage.getItem("amaliSolat_known")||"[]"));}catch(e){return new Set();}}
function saveKnown(){try{localStorage.setItem("amaliSolat_known",JSON.stringify([...known]));}catch(e){}}
function buildOrder(){order=DECK.filter(c=>filter==="all"||c.s===filter).map(c=>c.id);pos=0;}
function setAccent(sec){
  const map={persediaan:["--persediaan","--persediaan-bg"],dalam:["--dalam","--dalam-bg"],selepas:["--selepas","--selepas-bg"]};
  const [c,bg]=map[sec]||map.persediaan;
  document.documentElement.style.setProperty("--accent",`var(${c})`);
  document.documentElement.style.setProperty("--accent-bg",`var(${bg})`);
}
function render(){
  const total=order.length;
  if(!total){el("counter").textContent="Tiada kad";return;}
  const c=DECK[order[pos]];
  flipped=false;card.classList.remove("flip");
  setAccent(c.s);
  fChip.textContent=LABEL[c.s];bChip.textContent=LABEL[c.s];
  fQuestion.textContent=c.q;
  bAnswer.innerHTML="";
  // description list
  if(c.desc){
    const list=document.createElement(c.style==="num"?"ol":"ul");
    list.className=c.style==="num"?"points":"plain";
    c.desc.forEach(t=>{const li=document.createElement("li");li.textContent=t;list.appendChild(li);});
    bAnswer.appendChild(list);
  }
  // caption for bacaan
  if(c.acaption){const cap=document.createElement("div");cap.className="acaption";cap.textContent=c.acaption;bAnswer.appendChild(cap);}
  // arabic (array = stacked lines, string = single block)
  if(c.arabic){
    if(Array.isArray(c.arabic)){
      const w=document.createElement("div");w.className="arabic seq";
      c.arabic.forEach(l=>{const d=document.createElement("div");d.className="arabic-line";d.textContent=l;w.appendChild(d);});
      bAnswer.appendChild(w);
    }else{
      const d=document.createElement("div");d.className="arabic"+(c.arabic.length>130?" long":"");
      d.textContent=c.arabic;bAnswer.appendChild(d);
    }
  }
  // translation
  if(c.a2){const m=document.createElement("div");m.className="maksud";m.textContent="Maksudnya: "+c.a2;bAnswer.appendChild(m);}
  // note
  if(c.note){bNote.style.display="block";bNote.textContent=c.note;}else{bNote.style.display="none";}
  el("counter").textContent=`Kad ${pos+1} / ${total}`;
  el("barFill").style.width=((pos+1)/total*100)+"%";
  const knownInView=order.filter(id=>known.has(id)).length;
  el("knownCount").textContent=`✓ ${knownInView} sudah tahu`;
  el("btnKnown").classList.toggle("on",known.has(c.id));
}
function flip(){flipped=!flipped;card.classList.toggle("flip",flipped);}
function next(){if(!order.length)return;pos=(pos+1)%order.length;render();}
function prev(){if(!order.length)return;pos=(pos-1+order.length)%order.length;render();}
function shuffle(){for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}pos=0;render();}
card.addEventListener("click",flip);
el("btnFlip").addEventListener("click",e=>{e.stopPropagation();flip();});
el("btnNext").addEventListener("click",next);
el("btnPrev").addEventListener("click",prev);
el("btnShuffle").addEventListener("click",shuffle);
el("btnKnown").addEventListener("click",()=>{const id=DECK[order[pos]].id;known.has(id)?known.delete(id):known.add(id);saveKnown();render();});
el("btnReview").addEventListener("click",()=>{const id=DECK[order[pos]].id;known.delete(id);saveKnown();next();});
el("btnReset").addEventListener("click",()=>{if(confirm("Set semula semua progres 'sudah tahu'?")){known.clear();saveKnown();render();}});
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");filter=t.dataset.k;buildOrder();render();});
});
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")next();else if(e.key==="ArrowLeft")prev();
  else if(e.key===" "||e.key==="Enter"){e.preventDefault();flip();}
});
buildOrder();render();
</script>
