<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Ulang Kaji UPKK</title>
  <style>
    :root{--bg:#f7f3e9;--card:#fffdf7;--ink:#2b2a26;--soft:#6c675c;--line:#e5dcc8;--gold:#b58a1f}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#fbf8f0 0%,var(--bg) 100%);color:var(--ink);min-height:100vh;padding:28px 16px 40px}
    .wrap{max-width:760px;margin:0 auto}
    header{text-align:center;margin-bottom:28px}
    .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
    h1{margin:8px 0;font-size:34px;line-height:1.2}
    .sub{color:var(--soft);font-size:15px;line-height:1.5}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .card{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;min-height:150px;box-shadow:0 12px 30px rgba(80,65,30,.08);transition:transform .18s ease,box-shadow .18s ease}
    .card:hover{transform:translateY(-3px);box-shadow:0 16px 34px rgba(80,65,30,.12)}
    .icon{font-size:34px;margin-bottom:14px}
    .title{font-size:20px;font-weight:700;margin-bottom:6px}
    .desc{font-size:14px;color:var(--soft);line-height:1.45}
    footer{text-align:center;margin-top:28px;color:var(--soft);font-size:12px}
    @media(max-width:600px){h1{font-size:27px}.grid{grid-template-columns:1fr}.card{min-height:auto}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Portal Ulang Kaji</div>
      <h1>UPKK</h1>
      <div class="sub">Pilih modul untuk mula mengulang kaji.</div>
    </header>

    <main class="grid">
      <a class="card" href="pchi/">
        <div class="icon">📘</div>
        <div class="title">PCHI</div>
        <div class="desc">Kad imbas Penghayatan Cara Hidup Islam.</div>
      </a>

      <a class="card" href="sirah/">
        <div class="icon">🕌</div>
        <div class="title">Sirah</div>
        <div class="desc">Ulang kaji kisah dan perjalanan Rasulullah.</div>
      </a>

      <a class="card" href="hukum-ibadah/">
        <div class="icon">📖</div>
        <div class="title">Hukum Ibadah</div>
        <div class="desc">Nota dan latihan berkaitan hukum ibadah.</div>
      </a>

      <a class="card" href="amali-solat/">
        <div class="icon">🤲</div>
        <div class="title">Amali Solat</div>
        <div class="desc">Panduan dan ulang kaji amali solat.</div>
      </a>
    </main>

    <footer>Portal pembelajaran UPKK</footer>
  </div>
</body>
</html>
