<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f3e9">
  <title>Portal Ulang Kaji UPKK</title>
  <style>
    :root{
      --bg:#f7f3e9;--bg2:#fbf8f0;--card:#fffdf7;--ink:#2b2a26;
      --soft:#6c675c;--line:#e5dcc8;--gold:#b58a1f;--gold-soft:#f5ecd4;--error:#9c3b32
    }
    *{box-sizing:border-box}
    html{background:var(--bg)}
    body{
      margin:0;min-height:100vh;overflow-x:hidden;padding:28px 16px 42px;
      font-family:Arial,Helvetica,sans-serif;color:var(--ink);
      background:radial-gradient(900px 420px at 50% -120px,#fff 0%,transparent 72%),
      linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);
      -webkit-tap-highlight-color:transparent
    }
    .wrap{width:100%;max-width:820px;margin:0 auto}
    header{text-align:center;margin-bottom:28px}
    .eyebrow{font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
    h1{margin:8px 0 7px;font-family:Georgia,"Times New Roman",serif;font-size:36px;line-height:1.15}
    .sub{margin:0 auto;max-width:560px;color:var(--soft);font-size:14.5px;line-height:1.55}
    .divider{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:15px;color:var(--gold)}
    .divider::before,.divider::after{content:"";width:58px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
    .divider::after{background:linear-gradient(90deg,var(--gold),transparent)}
    .status{min-height:24px;margin:0 0 14px;text-align:center;color:var(--soft);font-size:12.5px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .card{
      display:flex;min-width:0;min-height:154px;flex-direction:column;justify-content:space-between;
      padding:22px;color:inherit;text-decoration:none;overflow-wrap:anywhere;background:var(--card);
      border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 30px rgba(80,65,30,.08);
      transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease
    }
    .card:hover,.card:focus-visible{
      transform:translateY(-3px);border-color:#d6c38f;box-shadow:0 17px 36px rgba(80,65,30,.13);outline:none
    }
    .icon{display:grid;width:46px;height:46px;place-items:center;margin-bottom:18px;font-size:27px;background:var(--gold-soft);border-radius:14px}
    .title{margin-bottom:6px;font-size:20px;font-weight:800;line-height:1.25}
    .desc{color:var(--soft);font-size:13.5px;line-height:1.45}
    .arrow{align-self:flex-end;margin-top:14px;color:var(--gold);font-size:20px;line-height:1}
    .message{padding:20px;text-align:center;color:var(--soft);background:var(--card);border:1px solid var(--line);border-radius:16px;line-height:1.5}
    .message.error{color:var(--error)}
    .retry{margin-top:12px;padding:10px 16px;font:inherit;font-weight:700;color:var(--ink);cursor:pointer;background:var(--card);border:1px solid var(--line);border-radius:10px}
    footer{margin-top:28px;text-align:center;color:var(--soft);font-size:11.5px;line-height:1.55}
    @media(max-width:600px){body{padding:22px 14px 36px}h1{font-size:29px}.grid{grid-template-columns:1fr}.card{min-height:135px}}
    @media(prefers-reduced-motion:reduce){.card{transition:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Portal Ulang Kaji</div>
      <h1>UPKK</h1>
      <p class="sub">Pilih modul untuk mula mengulang kaji.</p>
      <div class="divider" aria-hidden="true">۞</div>
    </header>

    <div class="status" id="status" aria-live="polite">Memuatkan modul…</div>
    <main class="grid" id="moduleGrid" aria-label="Senarai modul UPKK"></main>

    <footer>Modul baharu akan dipaparkan secara automatik selepas folder ditambah ke repositori.</footer>
  </div>

  <script>
    "use strict";

    const OWNER = "suhailij";
    const REPO = "UPKK";
    const BRANCH = "main";

    const MODULE_INFO = {
      "pchi": {title:"PCHI",icon:"📘",description:"Kad imbas Penghayatan Cara Hidup Islam.",order:1},
      "sirah": {title:"Sirah",icon:"🕌",description:"Ulang kaji kisah dan perjalanan Rasulullah.",order:2},
      "hukum-ibadah": {title:"Hukum Ibadah",icon:"📖",description:"Nota dan latihan berkaitan hukum ibadah.",order:3},
      "amali-solat": {title:"Amali Solat",icon:"🤲",description:"Panduan dan ulang kaji amali solat.",order:4}
    };

    const EXCLUDED_FOLDERS = new Set([".git",".github","assets","css","js","images","img"]);

    const grid = document.getElementById("moduleGrid");
    const status = document.getElementById("status");

    function titleFromSlug(slug){
      return slug.split(/[-_]+/).filter(Boolean)
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    function moduleDetails(folderName){
      const saved = MODULE_INFO[folderName] || {};
      return {
        folder:folderName,
        title:saved.title || titleFromSlug(folderName),
        icon:saved.icon || "📚",
        description:saved.description || "Buka modul ulang kaji ini.",
        order:Number.isFinite(saved.order) ? saved.order : 999
      };
    }

    function createCard(module){
      const link = document.createElement("a");
      link.className = "card";
      link.href = encodeURIComponent(module.folder) + "/";
      link.setAttribute("aria-label","Buka modul " + module.title);

      const body = document.createElement("div");
      const icon = document.createElement("div");
      icon.className = "icon";
      icon.setAttribute("aria-hidden","true");
      icon.textContent = module.icon;

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = module.title;

      const description = document.createElement("div");
      description.className = "desc";
      description.textContent = module.description;

      const arrow = document.createElement("div");
      arrow.className = "arrow";
      arrow.setAttribute("aria-hidden","true");
      arrow.textContent = "›";

      body.append(icon,title,description);
      link.append(body,arrow);
      return link;
    }

    function showError(message){
      status.textContent = "";
      grid.replaceChildren();

      const box = document.createElement("div");
      box.className = "message error";
      box.style.gridColumn = "1 / -1";

      const text = document.createElement("div");
      text.textContent = message;

      const retry = document.createElement("button");
      retry.className = "retry";
      retry.type = "button";
      retry.textContent = "Cuba semula";
      retry.addEventListener("click",loadModules);

      box.append(text,retry);
      grid.appendChild(box);
    }

    async function loadModules(){
      status.textContent = "Memuatkan modul…";
      grid.replaceChildren();

      const apiUrl =
        "https://api.github.com/repos/" +
        encodeURIComponent(OWNER) + "/" +
        encodeURIComponent(REPO) +
        "/contents?ref=" + encodeURIComponent(BRANCH);

      try{
        const response = await fetch(apiUrl,{
          headers:{
            "Accept":"application/vnd.github+json",
            "X-GitHub-Api-Version":"2022-11-28"
          }
        });

        if(!response.ok){
          throw new Error("GitHub API returned " + response.status);
        }

        const contents = await response.json();

        if(!Array.isArray(contents)){
          throw new Error("Unexpected repository response");
        }

        const modules = contents
          .filter(item =>
            item &&
            item.type === "dir" &&
            !item.name.startsWith(".") &&
            !EXCLUDED_FOLDERS.has(item.name.toLowerCase())
          )
          .map(item => moduleDetails(item.name))
          .sort((a,b) =>
            a.order - b.order ||
            a.title.localeCompare(b.title,"ms",{sensitivity:"base"})
          );

        if(modules.length === 0){
          status.textContent = "";
          const empty = document.createElement("div");
          empty.className = "message";
          empty.style.gridColumn = "1 / -1";
          empty.textContent = "Belum ada modul untuk dipaparkan.";
          grid.appendChild(empty);
          return;
        }

        const fragment = document.createDocumentFragment();
        modules.forEach(module => fragment.appendChild(createCard(module)));
        grid.appendChild(fragment);

        status.textContent = modules.length + " modul tersedia";
      }catch(error){
        console.error(error);
        showError("Senarai modul tidak dapat dimuatkan. Pastikan repositori UPKK adalah public dan sambungan internet tersedia.");
      }
    }

    loadModules();
  </script>
</body>
</html>
